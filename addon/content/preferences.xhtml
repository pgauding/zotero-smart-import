<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>
  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-matchThreshold"
      data-l10n-id="pref-match-threshold"
    ></html:label>
    <html:input
      type="number"
      id="zotero-prefpane-__addonRef__-matchThreshold"
      preference="matchThreshold"
      min="0"
      max="100"
      style="width: 60px"
    ></html:input>
  </hbox>
  <checkbox
    id="zotero-prefpane-__addonRef__-tagNewItems"
    preference="tagNewItems"
    data-l10n-id="pref-tag-new-items"
  />
  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-newItemTag"
      data-l10n-id="pref-new-item-tag"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-newItemTag"
      preference="newItemTag"
    ></html:input>
  </hbox>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
